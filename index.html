<meta charset="UTF-8" />
<title>车老板舞蹈视频库 · 4KCAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
        background: #0f0f0f;
        color: #fff;
    }

    /* ========== 顶部订阅栏 ========== */
    .top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: linear-gradient(135deg, #ff4d8f, #6a5af9);
        text-align: center;
        padding: 20px 15px;
        box-shadow: 0 4px 25px rgba(0,0,0,0.4);
    }

    .top-bar h1 {
        font-size: 22px;
        margin-bottom: 8px;
        letter-spacing: 1px;
    }

    .top-bar p {
        font-size: 13px;
        opacity: 0.85;
        margin-bottom: 18px;
    }

    /* 按钮容器 */
    .btn-group {
        display: flex;
        justify-content: center;
        gap: 15px; /* 按钮间距 */
        flex-wrap: wrap;
    }

    /* 订阅按钮 */
    .sub-btn {
        padding: 11px 28px;
        background: #000;
        color: #fff;
        border-radius: 25px;
        text-decoration: none;
        font-size: 15px;
        font-weight: bold;
        transition: all .3s;
    }

    .sub-btn:hover {
        background: #222;
        transform: scale(1.05);
    }

    /* 客服按钮 */
    .service-btn {
        padding: 11px 28px;
        background: rgba(255,255,255,0.95);
        color: #ff4d8f;
        border-radius: 25px;
        text-decoration: none;
        font-size: 15px;
        font-weight: bold;
        transition: all .3s;
    }

    .service-btn:hover {
        background: #fff;
        transform: scale(1.05);
    }

    /* ========== 主体 ========== */
    .container {
        max-width: 1200px;
        margin: auto;
        padding: 30px 15px;
    }

    .section-title {
        font-size: 20px;
        margin-bottom: 20px;
        padding-left: 12px;
        border-left: 4px solid #ff4d8f;
    }

    /* ========== 瀑布流图片墙 ========== */
    .gallery {
        column-count: 4;
        column-gap: 14px;
    }

    .gallery-item {
        break-inside: avoid;
        margin-bottom: 14px;
        border-radius: 14px;
        overflow: hidden;
        background: #1c1c1c;
        position: relative;
        cursor: pointer;
    }

    .gallery-item img {
        width: 100%;
        display: block;
        transition: transform .4s;
    }

    .gallery-item:hover img {
        transform: scale(1.06);
    }

    /* 悬浮信息 */
    .info {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 12px 10px 10px;
        background: linear-gradient(transparent, rgba(0,0,0,0.85));
        font-size: 12px;
        opacity: 0;
        transition: opacity .3s;
    }

    .info span {
        display: block;
        margin-top: 2px;
        color: #ff4d8f;
        font-weight: bold;
    }

    .gallery-item:hover .info {
        opacity: 1;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 900px) {
        .gallery { column-count: 3; }
    }

    @media (max-width: 600px) {
        .gallery { column-count: 2; }
        .top-bar h1 { font-size: 18px; }
        .btn-group { gap: 10px; }
        .sub-btn, .service-btn {
            padding: 10px 22px;
            font-size: 14px;
        }
    }

    /* ========== 页脚 ========== */
    footer {
        text-align: center;
        padding: 30px 20px;
        font-size: 12px;
        color: #555;
    }
</style>
</head>
